<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#25253a">
<title>Trening</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #25253a;
    --surface:      #2e2e45;
    --surface2:     #38384f;
    --border:       #4a4a68;
    --border-focus: #7070bb;
    --lime:   #c8ff00;
    --cyan:   #00e5ff;
    --orange: #ff6b35;
    --pink:   #ff4faa;
    --purple: #a78bfa;
    --teal:   #2dd4bf;
    --yellow: #ffd700;
    --green:  #4ade80;
    --text:   #f5f5ff;
    --meta:   #c8c8e8;
    --muted:  #8080b0;
    --danger: #ff4466;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overscroll-behavior:none; }

  #app { min-height:100vh; display:flex; flex-direction:column; padding:0 0 48px; }

  /* ── HEADER ── */
  header { padding:48px 20px 0; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }

  .day-badge { display:flex; flex-direction:column; gap:1px; }
  .day-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.15em; }
  .day-count { font-family:'Bebas Neue',sans-serif; font-size:50px; line-height:1; color:var(--lime); }
  .day-sub   { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; }

  .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }

  .app-title { font-family:'Bebas Neue',sans-serif; font-size:34px; color:var(--text); letter-spacing:0.12em; opacity:0.2; }

  /* ── WEIGHT WIDGET ── */
  .weight-widget { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
  .weight-display { display:flex; align-items:baseline; gap:4px; }
  .weight-val  { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--cyan); line-height:1; }
  .weight-unit { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
  .weight-label { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em; }
  .weight-btn {
    margin-top:2px;
    background: var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:4px 10px;
    font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
    cursor:pointer; letter-spacing:0.05em; -webkit-appearance:none;
    transition: border-color 0.15s, color 0.15s;
  }
  .weight-btn:active { transform:scale(0.93); }
  .weight-btn:hover  { border-color:var(--cyan); color:var(--cyan); }

  /* ── HERO ── */
  .hero { padding:18px 20px 0; }
  .hero-line { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .hero-date { font-family:'DM Mono',monospace; font-size:13px; color:var(--meta); }

  .divider { height:1px; background:var(--border); margin:18px 20px; }

  /* ── EXERCISE GROUPS ── */
  .exercises { padding:0 16px; display:flex; flex-direction:column; gap:20px; flex:1; }

  .ex-group-header {
    display:flex; align-items:center; gap:10px; margin-bottom:8px;
  }
  .ex-group-title {
    font-family:'Bebas Neue',sans-serif; font-size:13px;
    letter-spacing:0.22em; text-transform:uppercase;
    color:var(--muted); white-space:nowrap;
  }
  .ex-group-line { flex:1; height:1px; background:var(--border); }

  .ex-group-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  .ex-btn {
    width:100%; border:none; border-radius:14px; padding:0;
    cursor:pointer; transition:transform 0.12s ease; -webkit-appearance:none;
  }
  .ex-btn:active { transform:scale(0.96); }

  .ex-btn-inner {
    display:flex; flex-direction:column;
    align-items:flex-start; justify-content:space-between;
    padding:12px 14px 10px; min-height:68px;
  }

  .ex-btn-top   { display:flex; align-items:flex-start; justify-content:space-between; width:100%; }
  .ex-btn-name  { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.05em; line-height:1.1; text-align:left; }
  .ex-btn-arrow { font-size:14px; opacity:0.4; color:var(--meta); margin-top:1px; }
  .ex-btn-meta  { font-family:'DM Mono',monospace; font-size:9px; color:var(--meta); line-height:1.4; margin-top:4px; opacity:0.85; }

  /* Colour themes */
  .ex-btn.c-cyan   { background:linear-gradient(145deg,#002c3a,#001e28); border:1px solid rgba(0,229,255,0.22); }
  .ex-btn.c-cyan   .ex-btn-name { color:var(--cyan); }
  .ex-btn.c-teal   { background:linear-gradient(145deg,#003530,#002420); border:1px solid rgba(45,212,191,0.22); }
  .ex-btn.c-teal   .ex-btn-name { color:var(--teal); }
  .ex-btn.c-pink   { background:linear-gradient(145deg,#300020,#200015); border:1px solid rgba(255,79,170,0.22); }
  .ex-btn.c-pink   .ex-btn-name { color:var(--pink); }
  .ex-btn.c-purple { background:linear-gradient(145deg,#201535,#160e25); border:1px solid rgba(167,139,250,0.22); }
  .ex-btn.c-purple .ex-btn-name { color:var(--purple); }
  .ex-btn.c-lime   { background:linear-gradient(145deg,#223000,#162000); border:1px solid rgba(200,255,0,0.22); }
  .ex-btn.c-lime   .ex-btn-name { color:var(--lime); }
  .ex-btn.c-orange { background:linear-gradient(145deg,#301800,#201000); border:1px solid rgba(255,107,53,0.22); }
  .ex-btn.c-orange .ex-btn-name { color:var(--orange); }
  .ex-btn.c-yellow { background:linear-gradient(145deg,#302200,#201500); border:1px solid rgba(255,215,0,0.22); }
  .ex-btn.c-yellow .ex-btn-name { color:var(--yellow); }
  .ex-btn.c-green  { background:linear-gradient(145deg,#002818,#001810); border:1px solid rgba(74,222,128,0.22); }
  .ex-btn.c-green  .ex-btn-name { color:var(--green); }

  .footer-hint { text-align:center; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-top:14px; grid-column:1/-1; }

  /* ── WEIGHT MODAL ── */
  .wmodal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.7); z-index:200;
    align-items:center; justify-content:center;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  .wmodal-overlay.open { display:flex; animation:fadeIn 0.18s ease; }
  .wmodal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:22px; padding:28px 24px 24px;
    width:88%; max-width:340px;
    animation:popIn 0.22s cubic-bezier(0.34,1.4,0.64,1);
  }
  @keyframes popIn { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }

  .wmodal-title { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--cyan); letter-spacing:0.06em; margin-bottom:6px; }
  .wmodal-sub   { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:20px; }
  .wmodal-input-row { display:flex; gap:8px; align-items:center; margin-bottom:16px; }
  .wmodal-input {
    flex:1; background:var(--bg); border:1px solid var(--border);
    border-radius:10px; padding:13px 44px 13px 16px;
    font-family:'Bebas Neue',sans-serif; font-size:28px;
    color:var(--text); outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  .wmodal-input:focus { border-color:var(--border-focus); }
  .wmodal-unit { font-family:'DM Mono',monospace; font-size:13px; color:var(--muted); flex-shrink:0; }
  .wmodal-save {
    width:100%; padding:13px; background:rgba(0,229,255,0.1);
    border:1px solid rgba(0,229,255,0.3); border-radius:12px;
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.06em;
    color:var(--cyan); cursor:pointer; -webkit-appearance:none; margin-bottom:10px;
  }
  .wmodal-save:active { opacity:0.7; }
  .wmodal-cancel {
    width:100%; padding:10px; background:transparent; border:none;
    font-family:'DM Sans',sans-serif; font-size:14px; color:var(--muted);
    cursor:pointer; -webkit-appearance:none;
  }
  .wmodal-history { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-top:4px; }
  .wmodal-history-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--border); }
  .wmodal-history-row:last-child { border-bottom:none; }

  /* ── EXERCISE MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.82); z-index:100;
    align-items:flex-end; justify-content:center;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .modal-overlay.open { display:flex; animation:fadeIn 0.18s ease; }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{transform:translateY(50px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal {
    background:var(--surface); border-radius:28px 28px 0 0;
    width:100%; max-width:480px; padding:10px 22px 52px;
    animation:slideUp 0.28s cubic-bezier(0.34,1.4,0.64,1);
    max-height:94vh; overflow-y:auto;
  }

  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:10px auto 20px; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .modal-title  { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:0.06em; }
  .modal-date-small { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }

  .section-label { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.18em; color:var(--muted); margin-bottom:8px; }

  .orm-card { background:var(--surface2); border:1px solid var(--border); border-radius:16px; padding:14px 16px; margin-bottom:18px; }
  .orm-prev-row { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:10px; }
  .orm-prev-row .highlight { color:var(--lime); font-size:13px; }
  .orm-input-row { display:flex; gap:8px; align-items:center; }

  .input-wrap { position:relative; flex:1; }
  .num-input {
    width:100%; background:var(--bg); border:1px solid var(--border);
    border-radius:10px; padding:12px 42px 12px 14px;
    font-family:'Bebas Neue',sans-serif; font-size:26px;
    color:var(--text); outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  .num-input:focus { border-color:var(--border-focus); }
  .num-input::placeholder { opacity:0.25; }
  .input-unit { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); pointer-events:none; }

  .save-btn {
    background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px;
    font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:0.05em;
    color:var(--muted); cursor:pointer; flex-shrink:0; transition:all 0.15s; -webkit-appearance:none;
  }
  .save-btn:active { transform:scale(0.93); }
  .save-btn.saved  { background:rgba(200,255,0,0.12); border-color:rgba(200,255,0,0.35); color:var(--lime); }

  .sets-list { display:flex; flex-direction:column; gap:8px; margin-bottom:22px; }
  .set-row { background:var(--surface2); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color 0.2s; }
  .set-row.logged { border-color:rgba(200,255,0,0.25); background:rgba(200,255,0,0.04); }
  .set-row-top { display:flex; align-items:center; gap:10px; padding:10px 14px; }
  .set-name-label { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.05em; color:var(--muted); width:46px; flex-shrink:0; }
  .set-row.logged .set-name-label { color:var(--text); }
  .set-fields { display:flex; gap:8px; flex:1; }
  .set-field-wrap { display:flex; flex-direction:column; gap:3px; flex:1; }
  .set-field-label { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
  .set-small-input {
    width:100%; background:var(--bg); border:1px solid var(--border);
    border-radius:8px; padding:9px 30px 9px 10px;
    font-family:'DM Mono',monospace; font-size:16px;
    color:var(--text); outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  .set-small-input:focus { border-color:var(--border-focus); }
  .set-small-input::placeholder { opacity:0.25; }
  .set-small-unit { position:absolute; right:9px; top:50%; transform:translateY(-50%); font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); pointer-events:none; }
  .set-save-btn {
    background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 12px;
    font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--muted);
    cursor:pointer; flex-shrink:0; transition:all 0.15s; -webkit-appearance:none; align-self:flex-end;
  }
  .set-save-btn:active { transform:scale(0.93); }
  .set-save-btn.saved  { background:rgba(200,255,0,0.12); border-color:rgba(200,255,0,0.35); color:var(--lime); }
  .set-prev-row { padding:0 14px 10px 60px; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); display:none; }
  .set-prev-row.visible { display:block; }
  .set-prev-row .prev-val { color:var(--meta); }

  .log-section { margin-bottom:20px; }
  .log-day { border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:6px; }
  .log-day-header { display:flex; align-items:center; justify-content:space-between; padding:11px 16px; cursor:pointer; user-select:none; background:var(--surface2); }
  .log-day-header:active { background:var(--border); }
  .log-day-date    { font-family:'DM Mono',monospace; font-size:12px; color:var(--text); }
  .log-day-date.today-date { color:var(--lime); }
  .log-day-summary { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
  .log-day-chevron { font-size:14px; color:var(--muted); transition:transform 0.2s; }
  .log-day-chevron.open { transform:rotate(180deg); }
  .log-day-body { display:none; background:#161624; border-top:1px solid var(--border); padding:10px 16px; }
  .log-day-body.open { display:block; }
  .log-entry-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid var(--border); }
  .log-entry-row:last-child { border-bottom:none; }
  .log-entry-label { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); }
  .log-entry-val   { font-family:'DM Mono',monospace; font-size:13px; color:var(--lime); }
  .log-empty { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); text-align:center; padding:10px 0; }

  .close-btn { width:100%; padding:14px; background:var(--surface2); border:1px solid var(--border); border-radius:14px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; -webkit-appearance:none; }
  .close-btn:active { opacity:0.6; }

  .toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--surface2); border:1px solid var(--border); border-radius:40px;
    padding:10px 20px; font-family:'DM Mono',monospace; font-size:13px; color:var(--lime);
    z-index:300; transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1),opacity 0.28s;
    white-space:nowrap; opacity:0; pointer-events:none;
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ── REST TIMER ── */
  .rest-timer {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(100px);
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:40px; padding:10px 10px 10px 22px;
    z-index:301; opacity:0; pointer-events:none;
    transition:transform 0.32s cubic-bezier(0.34,1.4,0.64,1), opacity 0.32s;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
  }
  .rest-timer.show { transform:translateX(-50%) translateY(0); opacity:1; pointer-events:all; }
  .rest-timer-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em; }
  .rest-timer-clock { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--lime); letter-spacing:0.06em; line-height:1; min-width:52px; text-align:center; }
  .rest-timer-clock.ticking { color:var(--cyan); }
  .rest-timer-start {
    background:rgba(200,255,0,0.12); border:1px solid rgba(200,255,0,0.35);
    border-radius:30px; padding:8px 18px;
    font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:0.06em;
    color:var(--lime); cursor:pointer; -webkit-appearance:none; transition:all 0.15s;
  }
  .rest-timer-start:active { transform:scale(0.93); }
  .rest-timer-stop {
    background:rgba(255,107,53,0.12); border:1px solid rgba(255,107,53,0.35);
    border-radius:30px; padding:8px 18px;
    font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:0.06em;
    color:var(--orange); cursor:pointer; -webkit-appearance:none;
    transition:all 0.15s; display:none;
  }
  .rest-timer-stop:active { transform:scale(0.93); }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="day-badge">
      <span class="day-label">Days trained</span>
      <span class="day-count" id="dayCount">5</span>
      <span class="day-sub">since first session</span>
    </div>
    <div class="header-right">
      <div class="app-title">TRENING</div>
      <div class="weight-widget">
        <div class="weight-display">
          <span class="weight-val" id="weightVal">—</span>
          <span class="weight-unit" id="weightUnitLabel"></span>
        </div>
        <span class="weight-label">Current weight</span>
        <button class="weight-btn" onclick="openWeightModal()">Update weight</button>
      </div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-line">Today</div>
    <div class="hero-date" id="todayDate"></div>
  </div>

  <div class="divider"></div>
  <div class="exercises" id="exerciseList"></div>
  <div style="padding:0 16px;margin-top:4px"><div class="footer-hint">All data saved on your device</div></div>
</div>

<!-- WEIGHT MODAL -->
<div class="wmodal-overlay" id="weightOverlay" onclick="handleWeightOverlay(event)">
  <div class="wmodal">
    <div class="wmodal-title">YOUR WEIGHT</div>
    <div class="wmodal-sub">Enter your current body weight</div>
    <div class="wmodal-input-row">
      <input class="wmodal-input" id="weightInput" type="number" inputmode="decimal" placeholder="0" min="30" max="300" step="0.1">
      <span class="wmodal-unit">kg</span>
    </div>
    <button class="wmodal-save" onclick="saveWeight()">Save</button>
    <button class="wmodal-cancel" onclick="closeWeightModal()">Cancel</button>
    <div class="wmodal-history" id="weightHistory"></div>
  </div>
</div>

<!-- EXERCISE MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-date-small" id="modalDateSmall"></div>
    </div>
    <div class="section-label">1RM — One Rep Max</div>
    <div class="orm-card">
      <div class="orm-prev-row" id="ormPrevRow"></div>
      <div class="orm-input-row">
        <div class="input-wrap">
          <input class="num-input" id="ormInput" type="number" inputmode="decimal" placeholder="0" min="0" max="999" step="0.5">
          <span class="input-unit">kg</span>
        </div>
        <button class="save-btn" id="ormSaveBtn" onclick="saveOrm()">Save</button>
      </div>
    </div>
    <div class="section-label">Sets</div>
    <div class="sets-list" id="setsList"></div>
    <div class="section-label">Training log</div>
    <div class="log-section" id="logSection"></div>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- REST TIMER -->
<div class="rest-timer" id="restTimer">
  <div style="display:flex;flex-direction:column;gap:2px">
    <span class="rest-timer-label">Rest</span>
    <span class="rest-timer-clock" id="timerClock">0:00</span>
  </div>
  <button class="rest-timer-start" id="timerStartBtn" onclick="startTimer()">Start</button>
  <button class="rest-timer-stop"  id="timerStopBtn"  onclick="stopTimer()">Stop</button>
</div>


<script>
// ── EXERCISE GROUPS ──
// Chest/Triceps → teal, Back/Biceps → yellow, Legs → orange, Shoulders → purple
const GROUPS = [
  {
    label: 'Chest / Triceps',
    color: 'c-teal',
    exercises: ['Benchpress','Incline Press','Flyes','Dips','Push-down'],
  },
  {
    label: 'Back / Biceps',
    color: 'c-yellow',
    exercises: ['Deadlift','Standing Row','Pull-down','Pull-ups','Biceps Curl'],
  },
  {
    label: 'Legs',
    color: 'c-orange',
    exercises: ['Squats','Leg Curl','Leg Press','Lunges'],
  },
  {
    label: 'Shoulders',
    color: 'c-purple',
    exercises: ['Shoulder Press','Side Raises'],
  },
];

// Flat list for lookups
const EXERCISES = GROUPS.flatMap(g => g.exercises.map(name => ({ name, color: g.color })));

// ── STORAGE ──
function getLog()        { try { return JSON.parse(localStorage.getItem('treningLog')     || '[]');  } catch(e) { return []; } }
function saveLog(l)      { localStorage.setItem('treningLog', JSON.stringify(l)); }
function getOrm()        { try { return JSON.parse(localStorage.getItem('treningOrm')     || '{}');  } catch(e) { return {}; } }
function saveOrmStore(d) { localStorage.setItem('treningOrm', JSON.stringify(d)); }
function getWeights()    { try { return JSON.parse(localStorage.getItem('treningWeights') || '[]');  } catch(e) { return []; } }
function saveWeights(w)  { localStorage.setItem('treningWeights', JSON.stringify(w)); }

// ── DATES ──
function today() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}
function formatDateNice(str) {
  const [dd,mm,yyyy] = str.split('.');
  const d = new Date(+yyyy,+mm-1,+dd);
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${+dd} ${months[+mm-1]} ${yyyy}`;
}

// ── WIPE ALL PREVIOUS DATA (runs once on v7 load) ──
function seedData() {
  if (localStorage.getItem('treningCleanV7')) return;
  // Clear everything from all previous versions
  localStorage.removeItem('treningLog');
  localStorage.removeItem('treningOrm');
  localStorage.removeItem('treningWeights');
  localStorage.removeItem('treningSeededV5');
  localStorage.removeItem('treningSeededV6');
  localStorage.setItem('treningCleanV7', '1');
}

// ── DAY COUNT ──
// BASE_DAYS = 6: your 6 previous sessions before using this app.
// Each new unique date you log adds 1 on top.
const BASE_DAYS = 6;
function getDayCount() {
  const logDates = getLog().map(e => e.date);
  const ormData  = getOrm();
  const ormDates = Object.values(ormData).flatMap(arr => arr.map(e => e.date));
  return BASE_DAYS + new Set([...logDates, ...ormDates]).size;
}
function updateDayCount() {
  document.getElementById('dayCount').textContent = getDayCount();
}

// ── WEIGHT HELPERS ──
function getCurrentWeight() {
  const w = getWeights();
  return w.length ? w[w.length-1] : null;
}
function refreshWeightDisplay() {
  const w = getCurrentWeight();
  document.getElementById('weightVal').textContent      = w ? w.kg : '—';
  document.getElementById('weightUnitLabel').textContent = w ? 'kg' : '';
}

// ── WEIGHT MODAL ──
function openWeightModal() {
  const w = getCurrentWeight();
  document.getElementById('weightInput').value = w ? w.kg : '';
  renderWeightHistory();
  document.getElementById('weightOverlay').classList.add('open');
  setTimeout(() => document.getElementById('weightInput').focus(), 200);
}
function closeWeightModal() {
  document.getElementById('weightOverlay').classList.remove('open');
}
function handleWeightOverlay(e) {
  if (e.target === document.getElementById('weightOverlay')) closeWeightModal();
}
function saveWeight() {
  const raw = document.getElementById('weightInput').value.replace(',','.');
  const kg  = parseFloat(raw);
  if (!raw || isNaN(kg) || kg < 30 || kg > 300) {
    document.getElementById('weightInput').style.borderColor = 'var(--danger)';
    setTimeout(() => document.getElementById('weightInput').style.borderColor = '', 800);
    showToast('Enter a valid weight');
    return;
  }
  const weights = getWeights();
  // Upsert today's weight entry
  const idx = weights.findIndex(w => w.date === today());
  if (idx >= 0) weights[idx].kg = kg; else weights.push({ date:today(), kg });
  saveWeights(weights);
  refreshWeightDisplay();
  renderWeightHistory();
  document.getElementById('weightInput').value = '';
  showToast(`Weight updated — ${kg} kg ✓`);
  setTimeout(closeWeightModal, 800);
}
function renderWeightHistory() {
  const weights = getWeights().slice().reverse().slice(0, 5);
  const el = document.getElementById('weightHistory');
  if (!weights.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:6px;margin-top:12px">History</div>' +
    weights.map(w => `<div class="wmodal-history-row"><span>${formatDateNice(w.date)}</span><span style="color:var(--cyan)">${w.kg} kg</span></div>`).join('');
}

// ── LOG HELPERS ──
function upsertSetEntry(exercise, setNum, kg, reps) {
  const log = getLog();
  const idx = log.findIndex(e => e.exercise===exercise && e.date===today() && e.set===setNum);
  const entry = { exercise, date:today(), set:setNum, kg, reps };
  if (idx >= 0) log[idx] = entry; else log.push(entry);
  saveLog(log);
}
function getPrevSetEntry(exercise, setNum) {
  const entries = getLog().filter(e => e.exercise===exercise && e.set===setNum && e.date!==today());
  return entries.length ? entries[entries.length-1] : null;
}
function getOrmEntry(exercise, date) {
  return (getOrm()[exercise]||[]).find(e => e.date===date) || null;
}
function upsertOrmEntry(exercise, kg) {
  const d = getOrm();
  if (!d[exercise]) d[exercise] = [];
  const idx = d[exercise].findIndex(e => e.date===today());
  if (idx>=0) d[exercise][idx].kg=kg; else d[exercise].push({ date:today(), kg });
  saveOrmStore(d);
}
function getPrevOrmEntry(exercise) {
  const entries = (getOrm()[exercise]||[]).filter(e => e.date!==today());
  return entries.length ? entries[entries.length-1] : null;
}
function getAllDatesForExercise(exercise) {
  const logDates = [...new Set(getLog().filter(e=>e.exercise===exercise).map(e=>e.date))];
  const ormDates = (getOrm()[exercise]||[]).map(e=>e.date);
  return [...new Set([...logDates,...ormDates])].sort((a,b) => {
    const [ad,am,ay]=a.split('.').map(Number), [bd,bm,by]=b.split('.').map(Number);
    return new Date(by,bm-1,bd)-new Date(ay,am-1,ad);
  });
}

// ── STATE ──
let currentExercise = null;
const TITLE_COLORS = {
  'c-lime':'#c8ff00','c-cyan':'#00e5ff','c-orange':'#ff6b35',
  'c-pink':'#ff4faa','c-purple':'#a78bfa','c-teal':'#2dd4bf',
  'c-yellow':'#ffd700','c-green':'#4ade80'
};

// ── BUILD EXERCISE GROUPS ──
function buildExerciseList() {
  document.getElementById('exerciseList').innerHTML = GROUPS.map(group => `
    <div class="ex-group">
      <div class="ex-group-header">
        <span class="ex-group-title">${group.label}</span>
        <div class="ex-group-line"></div>
      </div>
      <div class="ex-group-grid">
        ${group.exercises.map(name => `
          <button class="ex-btn ${group.color}" onclick="openModal('${name}')">
            <div class="ex-btn-inner">
              <div class="ex-btn-top">
                <span class="ex-btn-name">${name}</span>
                <span class="ex-btn-arrow">›</span>
              </div>
              <span class="ex-btn-meta" id="meta-${name.replace(/[\s\-\/]/g,'_')}">Tap to log</span>
            </div>
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ── REFRESH MAIN ──
function refreshMain() {
  document.getElementById('todayDate').textContent = formatDateNice(today());
  updateDayCount();
  EXERCISES.forEach(ex => {
    const key = ex.name.replace(/[\s\-\/]/g,'_');
    const el  = document.getElementById('meta-'+key);
    if (!el) return;
    const entries = getLog().filter(e => e.exercise===ex.name && e.date===today());
    const orm = getOrmEntry(ex.name, today());
    const lines = [];
    if (orm) lines.push(`1RM:${orm.kg}kg`);
    if (entries.length) {
      const bySet = {};
      entries.forEach(e => bySet[e.set]=e.kg);
      lines.push(Object.keys(bySet).sort().map(s=>`S${s}:${bySet[s]}kg`).join(' '));
    }
    el.textContent = lines.length ? lines.join(' · ') : 'Tap to log';
  });
}

// ── OPEN EXERCISE MODAL ──
function openModal(exerciseName) {
  currentExercise = exerciseName;
  const ex = EXERCISES.find(e=>e.name===exerciseName);
  const title = document.getElementById('modalTitle');
  title.textContent = exerciseName.toUpperCase();
  title.style.color = TITLE_COLORS[ex.color]||'#f5f5ff';
  document.getElementById('modalDateSmall').textContent = formatDateNice(today());

  const todayOrm=getOrmEntry(exerciseName,today()), prevOrm=getPrevOrmEntry(exerciseName);
  const inp=document.getElementById('ormInput');
  inp.value=''; inp.placeholder=todayOrm?todayOrm.kg:'0';
  const btn=document.getElementById('ormSaveBtn');
  btn.textContent=todayOrm?'Saved ✓':'Save';
  todayOrm?btn.classList.add('saved'):btn.classList.remove('saved');

  const prevRow=document.getElementById('ormPrevRow');
  prevRow.innerHTML=prevOrm
    ?`Last 1RM: <span class="highlight">${prevOrm.kg} kg</span> <span style="opacity:0.4;font-size:10px">(${prevOrm.date})</span>`
    :`<span style="opacity:0.35">No previous 1RM recorded</span>`;

  document.getElementById('modalOverlay').classList.add('open');
  renderSets(); renderLog();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentExercise=null; refreshMain();
}
function handleOverlayClick(e) {
  if (e.target===document.getElementById('modalOverlay')) closeModal();
}

// ── 1RM ──
function saveOrm() {
  const raw=document.getElementById('ormInput').value.replace(',','.');
  const kg=parseFloat(raw);
  if (!raw||isNaN(kg)||kg<=0) {
    document.getElementById('ormInput').style.borderColor='var(--danger)';
    setTimeout(()=>document.getElementById('ormInput').style.borderColor='',800);
    showToast('Enter a weight first'); return;
  }
  upsertOrmEntry(currentExercise,kg);
  document.getElementById('ormInput').value='';
  document.getElementById('ormInput').placeholder=kg;
  const btn=document.getElementById('ormSaveBtn');
  btn.textContent='Saved ✓'; btn.classList.add('saved');
  renderLog(); refreshMain();
  showToast(`1RM — ${kg} kg saved ✓`);
}

// ── SETS ──
function renderSets() {
  const container=document.getElementById('setsList');
  container.innerHTML='';
  for (let s=1;s<=4;s++) {
    const prev=getPrevSetEntry(currentExercise,s);
    const row=document.createElement('div');
    row.className='set-row'; row.id='setRow'+s;
    let prevHtml='';
    if (prev) {
      prevHtml=`Last lift: <span class="prev-val">${prev.kg} kg`;
      if (prev.reps) prevHtml+=` × ${prev.reps} reps`;
      prevHtml+=`</span> <span style="opacity:0.3;font-size:10px">(${prev.date})</span>`;
    }
    row.innerHTML=`
      <div class="set-row-top">
        <span class="set-name-label">Set ${s}</span>
        <div class="set-fields">
          <div class="set-field-wrap">
            <span class="set-field-label">Weight</span>
            <div class="input-wrap">
              <input class="set-small-input" id="setKg${s}" type="number" inputmode="decimal" placeholder="kg" min="0" max="999" step="0.5">
              <span class="set-small-unit">kg</span>
            </div>
          </div>
          <div class="set-field-wrap">
            <span class="set-field-label">Reps</span>
            <div class="input-wrap">
              <input class="set-small-input" id="setReps${s}" type="number" inputmode="numeric" placeholder="reps" min="0" max="99" step="1">
              <span class="set-small-unit">×</span>
            </div>
          </div>
        </div>
        <button class="set-save-btn" id="setBtn${s}" onclick="logSet(${s})">Save</button>
      </div>
      <div class="set-prev-row ${prev?'visible':''}" id="setPrev${s}">${prevHtml}</div>`;
    container.appendChild(row);
  }
}

function logSet(setNum) {
  const kgRaw=document.getElementById('setKg'+setNum).value.replace(',','.');
  const repsRaw=document.getElementById('setReps'+setNum).value;
  const kg=parseFloat(kgRaw), reps=parseInt(repsRaw)||null;
  if (!kgRaw||isNaN(kg)||kg<=0) {
    document.getElementById('setKg'+setNum).style.borderColor='var(--danger)';
    setTimeout(()=>document.getElementById('setKg'+setNum).style.borderColor='',800);
    showToast('Enter weight first'); return;
  }
  upsertSetEntry(currentExercise,setNum,kg,reps);
  document.getElementById('setKg'+setNum).value='';
  document.getElementById('setReps'+setNum).value='';
  document.getElementById('setRow'+setNum).classList.add('logged');
  const btn=document.getElementById('setBtn'+setNum);
  btn.textContent='Saved ✓'; btn.classList.add('saved');
  const prevEl=document.getElementById('setPrev'+setNum);
  let msg=`Saved: <span class="prev-val">${kg} kg`;
  if (reps) msg+=` × ${reps} reps`;
  msg+='</span>';
  prevEl.innerHTML=msg; prevEl.classList.add('visible');
  setTimeout(()=>{ btn.textContent='Save'; btn.classList.remove('saved'); },1800);
  renderLog(); refreshMain();
  showRestTimer();
  showToast(`Set ${setNum} — ${kg} kg${reps?' × '+reps+' reps':''} saved ✓`);
}

// ── LOG ──
function renderLog() {
  const section=document.getElementById('logSection');
  const dates=getAllDatesForExercise(currentExercise);
  if (!dates.length) { section.innerHTML='<div class="log-empty">No sessions logged yet</div>'; return; }
  section.innerHTML=dates.map(date=>{
    const isToday=date===today();
    const orm=getOrmEntry(currentExercise,date);
    const sets=getLog().filter(e=>e.exercise===currentExercise&&e.date===date);
    const count=sets.length+(orm?1:0);
    const summary=`${count} entr${count===1?'y':'ies'}`;
    let body='';
    if (orm) body+=`<div class="log-entry-row"><span class="log-entry-label">1RM</span><span class="log-entry-val">${orm.kg} kg</span></div>`;
    sets.sort((a,b)=>a.set-b.set).forEach(e=>{
      let val=`${e.kg} kg`; if (e.reps) val+=` × ${e.reps} reps`;
      body+=`<div class="log-entry-row"><span class="log-entry-label">Set ${e.set}</span><span class="log-entry-val">${val}</span></div>`;
    });
    return `<div class="log-day">
      <div class="log-day-header" onclick="toggleLogDay('${date}')">
        <div>
          <div class="log-day-date ${isToday?'today-date':''}">${isToday?'Today — ':''}${formatDateNice(date)}</div>
          <div class="log-day-summary">${summary}</div>
        </div>
        <span class="log-day-chevron ${isToday?'open':''}" id="chevron-${date}">▾</span>
      </div>
      <div class="log-day-body ${isToday?'open':''}" id="logBody-${date}">${body}</div>
    </div>`;
  }).join('');
}

function toggleLogDay(date) {
  const body=document.getElementById('logBody-'+date);
  const chev=document.getElementById('chevron-'+date);
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open); chev.classList.toggle('open',!open);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}


// ── REST TIMER ──
let timerInterval  = null;
let timerSeconds   = 0;
let timerRunning   = false;

function showRestTimer() {
  // Reset to fresh state — show Start button, hide Stop
  timerSeconds = 0;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timerClock').textContent = '0:00';
  document.getElementById('timerClock').classList.remove('ticking');
  document.getElementById('timerStartBtn').style.display = 'block';
  document.getElementById('timerStopBtn').style.display  = 'none';
  document.getElementById('restTimer').classList.add('show');
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  document.getElementById('timerStartBtn').style.display = 'none';
  document.getElementById('timerStopBtn').style.display  = 'block';
  document.getElementById('timerClock').classList.add('ticking');
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds / 60);
    const s = String(timerSeconds % 60).padStart(2, '0');
    document.getElementById('timerClock').textContent = m + ':' + s;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerRunning  = false;
  document.getElementById('restTimer').classList.remove('show');
  document.getElementById('timerClock').classList.remove('ticking');
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});

// ── INIT ──
seedData();
buildExerciseList();
refreshMain();
refreshWeightDisplay();
</script>
