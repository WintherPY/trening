<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Trening</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2a;
    --border: #252535;
    --lime: #c8ff00;
    --cyan: #00e5ff;
    --orange: #ff6b35;
    --text: #eeeeff;
    --muted: #55556a;
    --danger: #ff4466;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overscroll-behavior: none;
  }

  /* ── MAIN SCREEN ── */
  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 0 32px;
  }

  header {
    padding: 52px 24px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .day-badge {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .day-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .day-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 1;
    color: var(--lime);
    letter-spacing: 0.02em;
  }

  .day-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--text);
    letter-spacing: 0.12em;
    padding-top: 8px;
    opacity: 0.15;
  }

  .hero {
    padding: 32px 24px 0;
  }

  .hero-line {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .hero-date {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    opacity: 0.5;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 24px;
  }

  .exercises {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
  }

  .ex-btn {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 0;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    -webkit-appearance: none;
  }

  .ex-btn:active { transform: scale(0.97); }

  .ex-btn-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 24px;
  }

  .ex-btn-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: left;
  }

  .ex-btn-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 0.06em;
    line-height: 1;
  }

  .ex-btn-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    opacity: 0.6;
  }

  .ex-btn-arrow {
    font-size: 22px;
    opacity: 0.5;
  }

  .ex-btn.deadlift {
    background: linear-gradient(135deg, #1a2600 0%, #0f1a00 100%);
    border: 1px solid rgba(200,255,0,0.2);
    box-shadow: 0 4px 24px rgba(200,255,0,0.06);
  }
  .ex-btn.deadlift .ex-btn-name { color: var(--lime); }
  .ex-btn.deadlift:active { box-shadow: 0 2px 12px rgba(200,255,0,0.15); }

  .ex-btn.bench {
    background: linear-gradient(135deg, #001a20 0%, #000f15 100%);
    border: 1px solid rgba(0,229,255,0.2);
    box-shadow: 0 4px 24px rgba(0,229,255,0.06);
  }
  .ex-btn.bench .ex-btn-name { color: var(--cyan); }
  .ex-btn.bench:active { box-shadow: 0 2px 12px rgba(0,229,255,0.15); }

  .ex-btn.squats {
    background: linear-gradient(135deg, #200f00 0%, #150800 100%);
    border: 1px solid rgba(255,107,53,0.2);
    box-shadow: 0 4px 24px rgba(255,107,53,0.06);
  }
  .ex-btn.squats .ex-btn-name { color: var(--orange); }
  .ex-btn.squats:active { box-shadow: 0 2px 12px rgba(255,107,53,0.15); }

  .footer-hint {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
    padding: 0 24px;
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: var(--surface);
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 12px 24px 48px;
    animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 92vh;
    overflow-y: auto;
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 8px auto 24px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    text-align: center;
  }

  .modal-title.deadlift { color: var(--lime); }
  .modal-title.bench    { color: var(--cyan); }
  .modal-title.squats   { color: var(--orange); }

  .modal-date {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .kg-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }

  .kg-input-wrap {
    position: relative;
    margin-bottom: 24px;
  }

  .kg-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 60px 18px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .kg-input:focus { border-color: var(--muted); }

  .kg-unit {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    pointer-events: none;
  }

  .sets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .set-btn {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 4px;
    -webkit-appearance: none;
  }

  .set-btn:active { transform: scale(0.95); }

  .set-btn.logged {
    border-color: rgba(200,255,0,0.3);
    background: rgba(200,255,0,0.05);
  }

  .set-btn-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .set-btn-val {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--lime);
    min-height: 16px;
  }

  /* ── LOG SECTION ── */
  .log-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .log-area {
    background: #08080d;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 20px;
    min-height: 60px;
    border: 1px solid var(--border);
  }

  .log-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }

  .log-row:last-child { border-bottom: none; }

  .log-set-name {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .log-set-kg {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--lime);
  }

  .log-empty {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 8px 0;
  }

  .close-btn {
    width: 100%;
    padding: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    -webkit-appearance: none;
  }

  .close-btn:active { opacity: 0.7; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--lime);
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* install banner */
  #install-banner {
    display: none;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    position: fixed;
    bottom: 0;
    width: 100%;
    z-index: 50;
  }

  #install-banner button {
    background: var(--lime);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 6px 16px;
    font-weight: 700;
    font-size: 13px;
    margin-left: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="day-badge">
      <span class="day-label">Days trained</span>
      <span class="day-count" id="dayCount">0</span>
      <span class="day-sub">since first session</span>
    </div>
    <div class="app-title">TRENING</div>
  </header>

  <div class="hero">
    <div class="hero-line">Today</div>
    <div class="hero-date" id="todayDate"></div>
  </div>

  <div class="divider"></div>

  <div class="exercises">
    <button class="ex-btn deadlift" onclick="openModal('Deadlift')">
      <div class="ex-btn-inner">
        <div class="ex-btn-left">
          <span class="ex-btn-name">Deadlift</span>
          <span class="ex-btn-meta" id="meta-Deadlift">Tap to log sets</span>
        </div>
        <span class="ex-btn-arrow">›</span>
      </div>
    </button>

    <button class="ex-btn bench" onclick="openModal('Benchpress')">
      <div class="ex-btn-inner">
        <div class="ex-btn-left">
          <span class="ex-btn-name">Benchpress</span>
          <span class="ex-btn-meta" id="meta-Benchpress">Tap to log sets</span>
        </div>
        <span class="ex-btn-arrow">›</span>
      </div>
    </button>

    <button class="ex-btn squats" onclick="openModal('Squats')">
      <div class="ex-btn-inner">
        <div class="ex-btn-left">
          <span class="ex-btn-name">Squats</span>
          <span class="ex-btn-meta" id="meta-Squats">Tap to log sets</span>
        </div>
        <span class="ex-btn-arrow">›</span>
      </div>
    </button>
  </div>

  <div class="footer-hint">All data saved locally on your device</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-date" id="modalDate"></div>

    <div class="kg-label">Weight</div>
    <div class="kg-input-wrap">
      <input class="kg-input" id="kgInput" type="number" inputmode="decimal" placeholder="0" min="0" max="999" step="0.5">
      <span class="kg-unit">kg</span>
    </div>

    <div class="sets-grid">
      <button class="set-btn" id="setBtn1" onclick="logSet(1)">
        <span class="set-btn-name">Set 1</span>
        <span class="set-btn-val" id="setVal1"></span>
      </button>
      <button class="set-btn" id="setBtn2" onclick="logSet(2)">
        <span class="set-btn-name">Set 2</span>
        <span class="set-btn-val" id="setVal2"></span>
      </button>
      <button class="set-btn" id="setBtn3" onclick="logSet(3)">
        <span class="set-btn-name">Set 3</span>
        <span class="set-btn-val" id="setVal3"></span>
      </button>
      <button class="set-btn" id="setBtn4" onclick="logSet(4)">
        <span class="set-btn-name">Set 4</span>
        <span class="set-btn-val" id="setVal4"></span>
      </button>
    </div>

    <div class="log-header">Today's log</div>
    <div class="log-area" id="logArea"></div>

    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  📲 Add to home screen for the full app experience
  <button id="installBtn">Install</button>
</div>

<script>
// ── STORAGE ──
function getLog() {
  try { return JSON.parse(localStorage.getItem('treningLog') || '[]'); }
  catch(e) { return []; }
}

function saveLog(log) {
  localStorage.setItem('treningLog', JSON.stringify(log));
}

function today() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}

function addEntry(exercise, setNum, kg) {
  const log = getLog();
  log.push({ date: today(), exercise, set: setNum, kg });
  saveLog(log);
}

function getTodayEntries(exercise) {
  return getLog().filter(e => e.date === today() && e.exercise === exercise);
}

function getLastKgForSet(exercise, setNum) {
  const entries = getTodayEntries(exercise).filter(e => e.set === setNum);
  return entries.length ? entries[entries.length-1].kg : null;
}

function getUniqueDayCount() {
  const dates = new Set(getLog().map(e => e.date));
  return dates.size;
}

// ── UI ──
let currentExercise = null;

function formatDate(d) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function refreshMain() {
  document.getElementById('dayCount').textContent = getUniqueDayCount();
  document.getElementById('todayDate').textContent = formatDate(new Date());

  ['Deadlift','Benchpress','Squats'].forEach(ex => {
    const entries = getTodayEntries(ex);
    const meta = document.getElementById('meta-' + ex);
    if (entries.length === 0) {
      meta.textContent = 'Tap to log sets';
    } else {
      const sets = [...new Set(entries.map(e => e.set))].sort();
      meta.textContent = sets.map(s => {
        const last = entries.filter(e => e.set === s).slice(-1)[0];
        return `S${s}: ${last.kg}kg`;
      }).join('  ');
    }
  });
}

function openModal(exercise) {
  currentExercise = exercise;
  const overlay = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  title.textContent = exercise.toUpperCase();
  title.className = 'modal-title ' + (exercise === 'Deadlift' ? 'deadlift' : exercise === 'Benchpress' ? 'bench' : 'squats');
  document.getElementById('modalDate').textContent = formatDate(new Date());
  document.getElementById('kgInput').value = '';
  overlay.classList.add('open');
  refreshModal();
  setTimeout(() => document.getElementById('kgInput').focus(), 300);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentExercise = null;
  refreshMain();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function refreshModal() {
  if (!currentExercise) return;
  for (let s = 1; s <= 4; s++) {
    const kg = getLastKgForSet(currentExercise, s);
    const valEl = document.getElementById('setVal' + s);
    const btn = document.getElementById('setBtn' + s);
    if (kg !== null) {
      valEl.textContent = kg + ' kg ✓';
      btn.classList.add('logged');
    } else {
      valEl.textContent = '';
      btn.classList.remove('logged');
    }
  }

  const logArea = document.getElementById('logArea');
  const entries = getTodayEntries(currentExercise);
  if (entries.length === 0) {
    logArea.innerHTML = '<div class="log-empty">No sets logged yet today</div>';
    return;
  }

  // Group by set, show last value per set
  const bySet = {};
  entries.forEach(e => {
    if (!bySet[e.set]) bySet[e.set] = [];
    bySet[e.set].push(e.kg);
  });

  logArea.innerHTML = Object.keys(bySet).sort().map(s =>
    `<div class="log-row">
      <span class="log-set-name">Set ${s}</span>
      <span class="log-set-kg">${bySet[s].join(' → ')} kg</span>
    </div>`
  ).join('');
}

function logSet(setNum) {
  const raw = document.getElementById('kgInput').value.replace(',','.');
  const kg = parseFloat(raw);
  if (!raw || isNaN(kg) || kg <= 0) {
    document.getElementById('kgInput').style.borderColor = 'var(--danger)';
    setTimeout(() => document.getElementById('kgInput').style.borderColor = '', 800);
    showToast('Enter weight first');
    return;
  }
  addEntry(currentExercise, setNum, kg);
  document.getElementById('kgInput').value = '';
  refreshModal();
  refreshMain();
  showToast(`Set ${setNum} — ${kg} kg logged ✓`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── PWA INSTALL ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});

// ── INIT ──
refreshMain();
</script>
</body>
</html>
